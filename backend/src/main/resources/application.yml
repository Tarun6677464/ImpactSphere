spring:
  application:
    name: impactsphere

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vms}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # 🚀 Enable CORS globally via Spring MVC
  mvc:
    cors:
      allowed-origins: 
        - https://<your-frontend-app-runner-url>   # ← put your frontend URL here
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers: 
        - "*"
      max-age: 3600

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:ChangeMeToA32ByteMinimumSecureSecretKey123456}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173} # optional

  ratelimit:
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:120}

logging:
  level:
    root: INFO
    com.vms: INFO
